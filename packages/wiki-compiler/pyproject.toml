[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wiki-compiler"
version = "0.3.0"
description = "Compile any markdown wiki into a persistent, AI-agent-ready knowledge base (chunks + embeddings + MCP manifest)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Mario Brosco", email = "info@42rows.com" },
]
maintainers = [
    { name = "42rows S.r.l.", email = "info@42rows.com" },
]
keywords = ["wiki", "rag", "mcp", "embeddings", "llm", "apify", "claude", "cursor"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "httpx>=0.27.0",
    "python-frontmatter>=1.1.0",
    "sentence-transformers>=3.0.0",
    "numpy>=1.26.0",
    "google-genai>=1.0.0",
    "anthropic>=0.39.0",
]

[project.optional-dependencies]
apify = ["apify>=2.0.0"]
pinecone = ["pinecone>=5.0.0"]
all = ["wiki-compiler[apify,pinecone]"]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
]

[project.scripts]
wiki-compile = "wiki_compiler.main:cli"

[project.urls]
Homepage = "https://github.com/42ROWS/wiki-embedded"
Documentation = "https://github.com/42ROWS/wiki-embedded#readme"
Repository = "https://github.com/42ROWS/wiki-embedded"
Issues = "https://github.com/42ROWS/wiki-embedded/issues"
Changelog = "https://github.com/42ROWS/wiki-embedded/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/wiki_compiler"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "-ra",
]
markers = [
    "unit: Unit tests (fast, no external deps)",
    "integration: Integration tests (may call APIs)",
    "slow: Slow tests (large datasets)",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["src/wiki_compiler"]
omit = ["tests/*", "*/__init__.py", "*/__main__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "pass",
]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "PTH",    # flake8-use-pathlib
    "RUF",    # ruff-specific
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (FastAPI/typer pattern)
    "B904",   # raise without from inside except
]

[tool.ruff.lint.isort]
known-first-party = ["wiki_compiler"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = false  # legacy code, will tighten in v0.3
ignore_missing_imports = true
